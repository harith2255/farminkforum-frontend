
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Essential Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Secure e-book reader with preview, DRM protection, and mock tests. Access thousands of books instantly." />
    <meta name="keywords" content="ebook, e-book reader, DRM protection, educational books, mock tests, online library, study materials, book platform" />
    <meta name="author" content="FarmInk Forum" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FarmInk Forum" />
    <meta property="og:description" content="Secure e-book reader with preview, DRM protection, and mock tests. Access thousands of books instantly." />
    <meta property="og:image" content="https://www.farminkforum.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://www.farminkforum.com" />
    <meta property="og:site_name" content="FarmInk Forum" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FarmInk Forum" />
    <meta name="twitter:description" content="Secure e-book reader with preview, DRM protection, and mock tests." />
    <meta name="twitter:image" content="https://www.farminkforum.com/og-image.png" />
    <meta name="twitter:site" content="@farminkforum" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FarmInk Forum",
      "url": "https://www.farminkforum.com",
      "logo": "https://www.farminkforum.com/logo.png",
      "description": "Secure e-book reader with preview, DRM protection, and mock tests",
      "sameAs": [
        "https://twitter.com/farminkforum",
        "https://facebook.com/farminkforum",
        "https://linkedin.com/company/farminkforum"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "farminkforum@gmail.com"
      }
    }
    </script>

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.farminkforum.com" />

    <!-- Favicons & App Icons -->
    <link rel="icon" href="/logooutline.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/logooutline.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Performance & Security -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect & DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>FarmInk Forum</title>
  </head>

    <body>
      <div id="root">
      </div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
